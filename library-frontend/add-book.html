<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library System | Add Book</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-book"></i>
            <span>LibrarySys</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html"><i class="fa-solid fa-list-ul"></i> Dashboard</a></li>
            <li class="active"><a href="add-book.html"><i class="fa-solid fa-book-medical"></i> Add Book</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <header class="top-header">
            <h1>Add New Book</h1>
            <div class="user-profile">
                <img src="https://ui-avatars.com/api/?name=Admin&background=0D8ABC&color=fff" alt="Admin">
                <span>Librarian</span>
            </div>
        </header>

        <section class="form-section card glass mx-auto max-w-800">
            <h2 class="mb-20">Book Information</h2>
            <form id="registerForm" class="elegant-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="title">Title *</label>
                        <input type="text" id="title" name="title" required placeholder="e.g. The Great Gatsby">
                    </div>
                    <div class="form-group">
                        <label for="author">Author *</label>
                        <input type="text" id="author" name="author" required placeholder="F. Scott Fitzgerald">
                    </div>
                    <div class="form-group">
                        <label for="isbn">ISBN *</label>
                        <input type="text" id="isbn" name="isbn" required placeholder="e.g. 9780743273565">
                    </div>
                    <div class="form-group">
                        <label for="genre">Genre *</label>
                        <input type="text" id="genre" name="genre" required placeholder="e.g. Fiction">
                    </div>
                    <div class="form-group">
                        <label for="publisher">Publisher *</label>
                        <input type="text" id="publisher" name="publisher" required placeholder="e.g. Scribner">
                    </div>
                    <div class="form-group">
                        <label for="publicationYear">Publication Year</label>
                        <input type="number" id="publicationYear" name="publicationYear" placeholder="e.g. 1925">
                    </div>
                    <div class="form-group">
                        <label for="totalCopies">Total Copies *</label>
                        <input type="number" id="totalCopies" name="totalCopies" required min="1" placeholder="e.g. 5">
                    </div>
                    <div class="form-group">
                        <label for="shelfLocation">Shelf Location</label>
                        <input type="text" id="shelfLocation" name="shelfLocation" placeholder="e.g. A1-2F">
                    </div>
                    <div class="form-group">
                        <label for="bookType">Book Type</label>
                        <select id="bookType" name="bookType">
                            <option value="Circulating" selected>Circulating</option>
                            <option value="Reference">Reference</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="status">Status</label>
                        <select id="status" name="status">
                            <option value="Available" selected>Available</option>
                            <option value="Checked Out">Checked Out</option>
                        </select>
                    </div>
                </div>

                <div class="form-actions mt-30">
                    <button type="submit" class="btn btn-primary btn-lg w-100">
                        <i class="fa-solid fa-check-circle"></i> Complete Registration
                    </button>
                </div>
            </form>
        </section>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="js/api.js"></script>
    <script src="js/add-book.js"></script>
</body>

</html>
